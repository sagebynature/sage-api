[loggers]
keys=root,uvicorn

[handlers]
keys=console

[formatters]
keys=default

[formatter_default]
class=logging.Formatter
format=%(asctime)s|%(module)s.%(funcName)s:L%(lineno)s|%(levelname)s %(message)s

[handler_console]
class=logging.StreamHandler
formatter=default
level=INFO

[logger_root]
level=INFO
handlers=console
propagate=0

[logger_uvicorn]
level=INFO
handlers=console
qualname=uvicorn
propagate=0

[logger_fastmcp]
level=INFO
handlers=console
qualname=FastMCP.fastmcp
propagate=0
